name: AI Stale Issue Manager

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has been automatically marked as stale due to 30 days of inactivity.
            It will be closed in 7 days if no further activity occurs.
            Reply to keep it active or the bot will close it.
          stale-pr-message: |
            This PR has been automatically marked as stale due to 30 days of inactivity.
            It will be closed in 7 days if no further activity occurs.
            Please update or close it.
          exempt-issue-labels: 'pinned,security,documentation'
          exempt-pr-labels: 'pinned,security,work-in-progress'
          ascending: true
          operations-per-run: 30
