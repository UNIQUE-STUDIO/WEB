<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Unique Web Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; background: #FDF8F0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { max-width: 600px; padding: 40px; }
        .code { font-size: 120px; font-weight: 800; color: #C8A96A; line-height: 1; }
        .title { font-size: 28px; font-weight: 700; color: #2d2d2d; margin: 20px 0 10px; }
        .desc { font-size: 16px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 32px; background: #C8A96A; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: background 0.3s; }
        .btn:hover { background: #b8943a; }
        .links { margin-top: 30px; }
        .links a { color: #999; text-decoration: none; margin: 0 10px; font-size: 14px; }
        .links a:hover { color: #C8A96A; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1 class="title">Page Not Found</h1>
        <p class="desc">The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
        <a href="/WEB/" class="btn">Back to Home</a>
        <div class="links">
            <a href="/WEB/#templates">Templates</a>
            <a href="/WEB/#portfolio">Portfolio</a>
            <a href="/WEB/#contact">Contact</a>
        </div>
    </div>
</body>
</html>
